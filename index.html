<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyAI | 간호학 전문 학습 조교</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard','Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
  :root{--accent:#6c63ff;--accent2:#a78bfa;--bg:#0f1117;--card:#1a1d27;--card2:#22263a;--border:#2d3148;--muted:#8892b0;--success:#10b981;--error:#f87171}
  header{background:#1a1d27;border-bottom:1px solid var(--border);padding:16px 24px}
  .logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .container{max-width:860px;margin:0 auto;padding:32px 16px}
  .section-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:24px}
  .btn{padding:12px 24px;border-radius:12px;border:none;cursor:pointer;font-weight:600;width:100%;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff}
  .btn:disabled{opacity:0.5}
  .hidden{display:none!important}
  .option{padding:12px;border:1px solid var(--border);margin:8px 0;border-radius:8px;cursor:pointer}
  .option.correct{background:rgba(16,185,129,0.2);border-color:var(--success)}
  .option.wrong{background:rgba(248,113,113,0.2);border-color:var(--error)}
</style>
</head>
<body>

<header><div class="logo">간호학과 조교</div></header>

<div class="container">
  <div id="uploadSection" class="section-card">
    <input type="password" id="apiKeyInput" placeholder="API 키 입력" class="w-full p-3 mb-4 rounded bg-[#22263a] border border-[#2d3148]">
    <input type="text" id="subjectInput" placeholder="과목명" class="w-full p-3 mb-4 rounded bg-[#22263a] border border-[#2d3148]">
    <div id="dropZone" class="p-10 border-2 border-dashed border-[#2d3148] text-center cursor-pointer" onclick="document.getElementById('fileInput').click()">
      파일 업로드
      <input type="file" id="fileInput" accept=".pdf,.txt" class="hidden">
    </div>
    <button class="btn mt-4" id="analyzeBtn" disabled onclick="window.startAnalysis()">✨ 학습 시작하기</button>
  </div>

  <div id="loadingSection" class="hidden text-center p-20">분석 중...</div>

  <div id="resultSection" class="hidden">
    <div id="lectureContent" class="section-card"></div>
    <div id="quizSection" class="section-card">
        <input type="number" id="quizCountInput" value="10" min="10" max="50">
        <button class="btn mt-2" onclick="window.startQuizGen()">퀴즈 생성</button>
        <div id="quizArea" class="mt-4"></div>
        <button id="nextBtn" class="btn mt-4 hidden" onclick="window.nextQuestion()">다음 문제</button>
    </div>
  </div>
</div>

<script>
  // PDF.js 워커 설정
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
  
  let fileContent = "";
  let quizData = [];
  let currentQ = 0;

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    document.getElementById('analyzeBtn').disabled = false;
    const reader = new FileReader();
    reader.onload = async (e) => {
        const typedarray = new Uint8Array(e.target.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            fileContent += content.items.map(s => s.str).join(" ");
        }
    };
    reader.readAsArrayBuffer(file);
  });

  window.startAnalysis = async function() {
    document.getElementById('uploadSection').classList.add('hidden');
    document.getElementById('loadingSection').classList.remove('hidden');
    
    const prompt = `내용: ${fileContent.substring(0, 5000)}\n지침: 핵심요약과 키워드를 JSON으로 응답 {"keywords":[], "lecture":""}`;
    const res = await callGemini(prompt);
    document.getElementById('lectureContent').innerHTML = res.lecture;
    document.getElementById('loadingSection').classList.add('hidden');
    document.getElementById('resultSection').classList.remove('hidden');
  };

  window.startQuizGen = async function() {
    const count = document.getElementById('quizCountInput').value;
    const prompt = `내용: ${fileContent.substring(0, 10000)}\n지침: ${count}개의 5지선다 퀴즈를 JSON 배열로 응답 {"question":"", "options":["1","2","3","4","5"], "answer":0, "explanation":""}`;
    quizData = await callGemini(prompt);
    showQuestion();
  };

  async function callGemini(prompt) {
    const key = document.getElementById('apiKeyInput').value;
    // 모델명: gemini-3-flash-preview (에러 시 gemini-1.5-flash로 수정하세요)
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`;
    const response = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { responseMimeType: "application/json" }})
    });
    const data = await response.json();
    return JSON.parse(data.candidates[0].content.parts[0].text);
  }

  function showQuestion() {
    const q = quizData[currentQ];
    document.getElementById('quizArea').innerHTML = `<h3>${q.question}</h3>` + q.options.map((o, i) => `<div class="option" onclick="window.checkAnswer(${i})">${o}</div>`).join('');
  }

  window.checkAnswer = (i) => { alert(i === quizData[currentQ].answer ? "정답" : "오답"); document.getElementById('nextBtn').classList.remove('hidden'); };
  
  window.nextQuestion = () => { currentQ++; showQuestion(); };
</script>
</body>
</html>
