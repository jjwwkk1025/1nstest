<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>StudyAI | 간호학 전문 조교</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f1117; color: #e2e8f0; font-family: sans-serif; }
        .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 1rem; padding: 1.5rem; }
    </style>
</head>
<body class="p-5">
    <div class="max-w-3xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400">StudyAI 조교 모드</h1>
        </header>

        <div class="card space-y-4">
            <input type="password" id="apiKey" placeholder="Gemini API Key" class="w-full p-3 rounded-lg bg-[#22263a] border border-[#2d3148] outline-none">
            <input type="file" id="pdfInput" accept=".pdf" class="w-full">
            <button onclick="processData()" class="w-full py-3 bg-indigo-600 rounded-lg font-bold hover:bg-indigo-700">분석 및 퀴즈 생성</button>
        </div>

        <div id="status" class="mt-4 text-center text-purple-400"></div>
        <div id="result" class="mt-6 space-y-4"></div>
    </div>

    <script>
        let fileText = "";

        // PDF 읽기
        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument({data: new Uint8Array(this.result)}).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += `\n[페이지 ${i}]\n` + content.items.map(s => s.str).join(" ");
                }
                fileText = text;
                document.getElementById('status').innerText = "파일 준비 완료!";
            };
            reader.readAsArrayBuffer(file);
        });

        async function processData() {
            const apiKey = document.getElementById('apiKey').value;
            if (!apiKey || !fileText) return alert("API 키와 파일을 확인하세요.");
            
            document.getElementById('status').innerText = "AI가 분석 중입니다... (잠시만 기다려주세요)";

            const prompt = `
            너는 간호학 전문 학습 조교야. 아래 PDF 내용을 분석해서 다음 형식의 JSON만 응답해.
            절대 다른 설명은 하지 마.
            {
                "summary": "핵심 요약(국시 포인트 포함)",
                "quiz": [
                    {"question": "문제 내용(출처 페이지 명시)", "options": ["1", "2", "3", "4", "5"], "answer": 0, "explanation": "해설 및 참고 페이지"}
                ]
            }
            내용: ${fileText.substring(0, 10000)}
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text);
                
                displayResult(result);
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerText = "오류 발생: " + err.message;
            }
        }

        function displayResult(data) {
            const resDiv = document.getElementById('result');
            resDiv.innerHTML = `<div class="card"><h2 class="text-xl font-bold mb-2">요약</h2><p>${data.summary}</p></div>`;
            
            data.quiz.forEach((q, i) => {
                resDiv.innerHTML += `
                    <div class="card mt-4">
                        <p class="font-bold">${i+1}. ${q.question}</p>
                        ${q.options.map((opt, j) => `<p class="ml-4">${j+1}. ${opt}</p>`).join('')}
                        <p class="mt-2 text-green-400">정답: ${q.answer + 1}</p>
                        <p class="text-sm text-gray-400">해설: ${q.explanation}</p>
                    </div>
                `;
            });
            document.getElementById('status').innerText = "완료!";
        }

        // PDF.js 워커 설정
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    </script>
</body>
</html>
