<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 시험 공부 도우미</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
</head>
<body class="p-5 bg-gray-100">
    <div class="max-w-3xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-4">AI 시험 공부 도우미</h1>
        
        <input type="password" id="apiKey" placeholder="Gemini API Key 입력" class="w-full p-2 border mb-4 rounded">
        
        <div class="mb-4">
            <label class="block mb-2">문제 수: <span id="qCountVal">10</span>개</label>
            <input type="range" id="qCount" min="10" max="20" value="10" class="w-full" oninput="document.getElementById('qCountVal').innerText=this.value">
        </div>

        <textarea id="textContent" class="w-full h-64 p-2 border mb-4 rounded" placeholder="PDF에서 복사한 텍스트를 붙여넣으세요. (내용에 페이지 번호가 포함되어 있으면 더 정확합니다)"></textarea>
        
        <button onclick="generateQuiz()" id="submitBtn" class="bg-blue-600 text-white w-full py-3 rounded font-bold hover:bg-blue-700">분석 및 퀴즈 생성</button>
        
        <div id="result" class="mt-6 whitespace-pre-line p-4 bg-gray-50 border rounded hidden"></div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // 1. API 키 자동 로드/저장
        const apiKeyInput = document.getElementById('apiKey');
        apiKeyInput.value = localStorage.getItem('gemini_api_key') || '';
        apiKeyInput.addEventListener('input', () => localStorage.setItem('gemini_api_key', apiKeyInput.value));

        window.generateQuiz = async () => {
            const apiKey = apiKeyInput.value;
            const text = document.getElementById('textContent').value;
            const count = document.getElementById('qCount').value;
            const resultDiv = document.getElementById('result');

            if (!apiKey || !text) { alert("API키와 학습할 내용을 입력하세요."); return; }

            resultDiv.classList.remove('hidden');
            resultDiv.innerText = "AI가 퀴즈를 생성 중입니다... (잠시만 기다려주세요)";
            
            const genAI = new GoogleGenerativeAI(apiKey);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const prompt = `
                당신은 전문 학습 도우미입니다. 아래 내용을 분석하여 ${count}개의 객관식 퀴즈를 만들어주세요.
                조건:
                1. 각 퀴즈마다 정답을 표시하고, 상세한 해설을 포함하세요.
                2. 해설에는 반드시 해당 내용이 참조된 "PDF 페이지 번호"를 명시하세요. (본문에 페이지 정보가 없다면 유추하거나 "참조 불가"로 표시)
                
                내용:
                ${text}
            `;

            try {
                const result = await model.generateContent(prompt);
                resultDiv.innerText = result.response.text();
            } catch (error) {
                resultDiv.innerText = "에러 발생: " + error.message;
            }
        };
    </script>
</body>
</html>
