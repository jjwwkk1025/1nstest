<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>StudyAI 학습 도우미</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-6">
    <div class="max-w-3xl mx-auto bg-gray-800 p-8 rounded-xl shadow-2xl">
        <h1 class="text-2xl font-bold mb-6 text-indigo-400">StudyAI 학습 도우미</h1>
        
        <div class="space-y-4">
            <input type="password" id="apiKey" placeholder="Google Gemini API Key 입력" class="w-full p-3 bg-gray-700 rounded-lg outline-none border border-gray-600 focus:border-indigo-500">
            <!-- 모델명 입력창 추가 -->
            <input type="text" id="modelName" value="gemini-1.5-flash" class="w-full p-3 bg-gray-700 rounded-lg outline-none border border-gray-600 focus:border-indigo-500">
            <p class="text-xs text-gray-500">* gemini-3.1-flash-lite-preview는 아직 지원하지 않을 수 있습니다.</p>
            <input type="file" id="pdfInput" accept=".pdf" class="w-full text-sm text-gray-400">
            <button onclick="processData()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 rounded-lg font-bold transition">분석 및 퀴즈 생성</button>
        </div>

        <div id="status" class="mt-4 p-4 rounded bg-gray-700 text-sm text-indigo-300 font-mono hidden"></div>
        <div id="result" class="mt-6 space-y-4"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        let fileText = "";

        document.getElementById('pdfInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument({data: new Uint8Array(this.result)}).promise;
                let text = "";
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += `\n[Page ${i}]\n` + content.items.map(s => s.str).join(" ");
                }
                fileText = text;
                showStatus(`PDF 추출 완료 (${text.length}자)`);
            };
            reader.readAsArrayBuffer(file);
        });

        function showStatus(msg) {
            const s = document.getElementById('status');
            s.classList.remove('hidden');
            s.innerText = msg;
        }

        async function processData() {
            const apiKey = document.getElementById('apiKey').value;
            const modelName = document.getElementById('modelName').value;
            if (!apiKey || !fileText) return alert("API 키와 파일을 준비해주세요.");

            showStatus("Gemini API (" + modelName + ") 호출 중...");

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: "너는 간호학 조교야. 아래 내용을 분석해서 JSON(summary, quiz)으로 줘. quiz는 (question, options, answer, explanation)구조야. 내용: " + fileText.substring(0, 8000) }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(`[${data.error.code}] ${data.error.message}`);
                }

                const responseText = data.candidates[0].content.parts[0].text;
                const cleanJson = responseText.replace(/```json|```/g, "").trim();
                const result = JSON.parse(cleanJson);
                
                displayResult(result);
                showStatus("분석 성공!");
            } catch (err) {
                console.error(err);
                showStatus("에러 발생: " + err.message);
            }
        }

        function displayResult(data) {
            const resDiv = document.getElementById('result');
            resDiv.innerHTML = `<div class="p-4 bg-gray-700 rounded-lg"><h2 class="font-bold text-indigo-400">요약</h2><p>${data.summary}</p></div>`;
            data.quiz.forEach((q, i) => {
                resDiv.innerHTML += `
                    <div class="p-4 bg-gray-800 border border-gray-700 rounded-lg">
                        <p class="font-semibold">${i+1}. ${q.question}</p>
                        ${q.options.map((o, idx) => `<p class="ml-4 text-gray-300">${idx+1}. ${o}</p>`).join('')}
                        <p class="text-indigo-400 font-bold mt-2">정답: ${q.answer + 1}</p>
                        <p class="text-sm text-gray-400 mt-1">해설: ${q.explanation}</p>
                    </div>`;
            });
        }
    </script>
</body>
</html>
