<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="mainTitle">간호학과 조교</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard','Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
  :root{--accent:#6c63ff;--accent2:#a78bfa;--bg:#0f1117;--card:#1a1d27;--card2:#22263a;--border:#2d3148;--text:#e2e8f0;--muted:#8892b0;--success:#10b981;--error:#f87171}
  header{background:#1a1d27;border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:12px}
  .logo{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent; transition: all 0.5s ease;}
  .container{max-width:860px;margin:0 auto;padding:32px 16px}
  .section-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:24px;animation:fadeIn 0.5s ease}
  .input-group{margin-bottom:20px}
  .input-label{display:block;margin-bottom:8px;font-size:0.9rem;color:var(--accent2);font-weight:600}
  input[type="text"], input[type="password"], input[type="number"]{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--card2);color:white;outline:none}
  .upload-area{border:2px dashed var(--border);border-radius:20px;padding:40px 24px;text-align:center;cursor:pointer;background:var(--card);transition:all 0.3s}
  .upload-area:hover{border-color:var(--accent);background:#1e1b3a}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:12px;border:none;cursor:pointer;font-size:1rem;font-weight:600; transition:0.2s}
  .btn:active{transform:scale(0.98)}
  .btn-primary{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;width:100%;justify-content:center}
  .btn-outline{background:transparent; border:1px solid var(--border); color:var(--text); width:100%; justify-content:center; margin-top:12px}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .tabs{display:flex;gap:8px;background:var(--card);border-radius:14px;padding:6px;margin-bottom:24px}
  .tab{flex:1;padding:12px;border:none;background:transparent;color:var(--muted);border-radius:10px;cursor:pointer;font-weight:600}
  .tab.active{background:var(--accent);color:#fff}
  .summary-text{line-height:1.9;color:#cbd5e1;font-size:1.05rem;white-space:pre-wrap}
  .keyword-chip{display:inline-block;background:#1e1b3a;border:1px solid var(--accent);color:var(--accent2);border-radius:20px;padding:6px 14px;font-size:.85rem;margin:5px}
  .option{display:flex;align-items:center;gap:14px;padding:16px;border-radius:12px;border:1px solid var(--border);cursor:pointer;background:var(--card2);margin-bottom:10px}
  .option.correct{border-color:var(--success);background:rgba(16,185,129,0.1);color:var(--success)}
  .option.wrong{border-color:var(--error);background:rgba(248,113,113,0.1);color:var(--error)}
  .loader{display:flex;flex-direction:column;align-items:center;gap:20px;padding:60px 0}
  .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<header>
  <div class="logo" id="siteLogo">간호학과 조교</div>
</header>

<div class="container">
  <div id="uploadSection">
    <div class="section-card">
      <div class="input-group">
        <label class="input-label">🔑 Groq API 키 (자동 저장됨)</label>
        <input type="password" id="apiKeyInput" placeholder="여기에 Groq API 키를 붙여넣으세요">
      </div>
      <div class="input-group">
        <label class="input-label">📌 과목명 및 시험 범위</label>
        <input type="text" id="subjectInput" placeholder="예: 성인간호학 - 순환기계 구조와 기능">
      </div>
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <span style="font-size:2.5rem">📄</span>
        <h3 style="margin-top:10px">강의 자료(PDF/TXT) 업로드</h3>
        <p style="color:var(--muted); font-size:0.9rem; margin-top:5px;">파일을 선택하면 글자 추출이 시작됩니다.</p>
        <input type="file" id="fileInput" accept=".pdf,.txt" style="display:none">
        <div id="fileBadge" class="hidden" style="margin-top:15px">
          <span style="background:var(--card2);padding:5px 12px;border-radius:6px;border:1px solid var(--border)">
            <span id="fileName"></span>
          </span>
        </div>
      </div>
      <button class="btn btn-primary" id="analyzeBtn" disabled onclick="startAnalysis()" style="margin-top:20px">✨ 학습 시작하기</button>
    </div>
  </div>

  <div id="loadingSection" class="hidden">
    <div class="loader"><div class="spinner"></div><p style="color:var(--accent2); font-weight:600">조교가 자료를 분석하고 있습니다...</p></div>
  </div>

  <div id="resultSection" class="hidden">
    <div class="tabs">
      <button class="tab active" id="tabSummary" onclick="switchTab('summary')">📖 개념 강의</button>
      <button class="tab" id="tabQuiz" onclick="switchTab('quiz')">✍ 국시 대비 문제</button>
    </div>
    
    <div id="summaryTab">
      <div class="section-card"><div id="keywords"></div><div class="summary-text" id="lectureContent" style="margin-top:20px"></div></div>
    </div>
    
    <div id="quizTab" class="hidden">
      <div id="quizSetup" class="section-card" style="text-align:center; padding:40px;">
        <h2 style="margin-bottom:20px; color:var(--accent2);">🧠 맞춤형 퀴즈 설정</h2>
        <div style="margin-bottom:30px;">
          <label style="font-size:1.1rem; font-weight:600;">출제할 문항 수 (10~50개) : </label>
          <input type="number" id="quizCountInput" min="10" max="50" value="10" style="width:100px; text-align:center; font-size:1.1rem;">
        </div>
        <button class="btn btn-primary" onclick="startQuizGen()" style="padding:15px; font-size:1.1rem;">🚀 퀴즈 생성 시작</button>
      </div>

      <div id="quizArea" class="hidden">
        <div id="quizProgress" style="margin-bottom:15px; font-weight:600; color:var(--accent2)"></div>
        <div id="questionCard" class="section-card"></div>
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>다음 문제로</button>
      </div>

      <div id="quizReviewArea" class="hidden">
        <div class="section-card">
            <h2 style="text-align:center; color:var(--accent2); margin-bottom:10px;">📝 오답 노트 확인</h2>
            <h3 id="finalScore" style="text-align:center; margin-bottom:30px; color:var(--muted);"></h3>
            <div id="reviewList"></div>
        </div>
        <div style="margin-bottom:40px;">
            <button class="btn btn-primary" onclick="resetQuizSetup()" style="padding:15px; font-size:1.1rem;">✍ 문제를 더 풀고 싶어요</button>
            <button class="btn btn-outline" onclick="location.reload()">🏠 처음 창으로 돌아가기 (파일 재업로드)</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let fileContent = "";
let quizData = [];
let currentQ = 0;
let score = 0;
let answered = false;
let wrongAnswers = [];

window.onload = function() {
  const savedKey = localStorage.getItem('study_ai_api_key');
  if (savedKey) {
    document.getElementById('apiKeyInput').value = savedKey;
  }
};

document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('fileName').textContent = `⏳ ${file.name} (글자 추출 중...)`;
  document.getElementById('fileBadge').classList.remove('hidden');
  document.getElementById('analyzeBtn').disabled = true;

  const reader = new FileReader();
  if (file.type === "application/pdf") {
    reader.onload = async function() {
      try {
        const typedarray = new Uint8Array(this.result);
        const pdfjsLib = window['pdfjs-dist/build/pdf'];
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        let text = "";
        for (let i = 1; i <= Math.min(pdf.numPages, 15); i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += `\n--- [${i} 페이지] ---\n` + content.items.map(s => s.str).join(" ") + "\n";
        }
        fileContent = text;
        document.getElementById('fileName').textContent = `✔ ${file.name} (준비 완료!)`;
        document.getElementById('analyzeBtn').disabled = false;
      } catch (err) {
        alert("PDF 추출 실패");
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    reader.onload = function() { 
      fileContent = this.result; 
      document.getElementById('fileName').textContent = `✔ ${file.name}`;
      document.getElementById('analyzeBtn').disabled = false;
    };
    reader.readAsText(file);
  }
});

async function askGroq(prompt) {
  const keyInput = document.getElementById('apiKeyInput').value.trim();
  if (!keyInput) throw new Error("API 키를 먼저 입력해주세요!");
  localStorage.setItem('study_ai_api_key', keyInput);

  const url = `https://api.groq.com/openai/v1/chat/completions`;

  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: { 
        'Authorization': `Bearer ${keyInput}`,
        'Content-Type': 'application/json' 
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          {
            role: "system",
            content: "You are a helpful nursing assistant. You must respond ONLY with valid JSON. Do not include any introductory or concluding text."
          },
          {
            role: "user",
            content: prompt
          }
        ],
        temperature: 0.2,
        max_tokens: 6000, // 문제 생성 중 끊김 방지
        response_format: { type: "json_object" } // 완벽한 JSON 포맷 강제
      })
    });
    
    const data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || "연결 실패");
    
    let result = data.choices[0].message.content;
    
    const jsonMatch = result.match(/[\{\[][\s\S]*[\}\]]/);
    return jsonMatch ? jsonMatch[0] : result.replace(/```json|```/g, "").trim();
  } catch (err) { throw err; }
}

  async function startAnalysis() {
  const subject = document.getElementById('subjectInput').value || "미지정 과목";
  
  document.getElementById('siteLogo').textContent = "귀요미 진서>.<를 위한 시험준비 도구";
  document.title = "간호학과 조교";
  
  document.getElementById('uploadSection').classList.add('hidden');
  document.getElementById('loadingSection').classList.remove('hidden');
  
  // 1. 프롬프트 수정: AI가 JSON 구조를 마음대로 바꾸지 못하게 강력하게 형태 지정
  const prompt = `간호학 조교로서 업로드 내용을 분석해 다음 JSON 형식으로만 정확하게 답하세요: {"keywords": ["키워드1", "키워드2"], "lecture": "전체 개념 요약 텍스트"}\n\n과목: ${subject}\n내용: ${fileContent.substring(0, 10000)}`;
  
  try {
    const res = await askGroq(prompt);
    let data = JSON.parse(res);
    
    // 2. 방어 코드 (1차 확인): AI가 데이터를 중첩된 객체로 보냈을 경우를 대비해 추출
    if (!data.lecture && data.response && data.response.lecture) data = data.response;
    if (!data.lecture && data.analysis && data.analysis.lecture) data = data.analysis;
    
    // 3. 방어 코드 (2차 확인): lecture가 아예 없거나 문자가 아닌 배열/객체로 올 경우 안전하게 변환
    const keywords = Array.isArray(data.keywords) ? data.keywords : [];
    let lectureText = "강의 내용을 분석하지 못했습니다. 다시 시도해주세요.";
    
    if (typeof data.lecture === 'string') {
        lectureText = data.lecture;
    } else if (Array.isArray(data.lecture)) {
        lectureText = data.lecture.join('\n'); // 배열일 경우 텍스트로 합치기
    } else if (data.lecture) {
        lectureText = JSON.stringify(data.lecture); // 그 외 객체일 경우 강제 문자열 변환
    }
    
    // 화면에 출력 (안전하게 String으로 바뀐 텍스트에만 replace 적용)
    document.getElementById('keywords').innerHTML = keywords.map(k => `<span class="keyword-chip">${k}</span>`).join('');
    document.getElementById('lectureContent').innerHTML = String(lectureText).replace(/\n/g, '<br>');
    
    document.getElementById('loadingSection').classList.add('hidden');
    document.getElementById('resultSection').classList.remove('hidden');
  } catch (e) { 
    alert("분석 실패: " + e.message); 
    location.reload(); 
  }
}


function startQuizGen() {
  let count = parseInt(document.getElementById('quizCountInput').value);
  if (count < 10) count = 10; if (count > 50) count = 50;
  document.getElementById('quizSetup').classList.add('hidden');
  generateQuiz(count);
}

function resetQuizSetup() {
    document.getElementById('quizReviewArea').classList.add('hidden');
    document.getElementById('quizSetup').classList.remove('hidden');
    window.scrollTo(0, 0);
}

async function generateQuiz(count) {
  document.getElementById('loadingSection').classList.remove('hidden');
  document.getElementById('resultSection').classList.add('hidden');
  
  // JSON 객체 형태로 안전하게 받도록 프롬프트 수정
  const prompt = `간호사 국가고시 스타일 5지선다 문제 ${count}개를 다음 JSON 형식으로 만드세요: {"questions": [{"question": "문제(영어병기) (출처: x페이지)", "options": ["보기1","보기2","보기3","보기4","보기5"], "answer": 0, "explanation": "[x페이지] 해설"}]} 내용: ${fileContent.substring(0, 15000)}`;
  
  try {
    const res = await askGroq(prompt);
    const parsedData = JSON.parse(res);
    // 가장 바깥쪽이 객체이므로 안쪽의 questions 배열만 꺼내옴
    quizData = parsedData.questions || parsedData; 
    currentQ = 0; score = 0; wrongAnswers = [];
    showQuestion();
    document.getElementById('loadingSection').classList.add('hidden');
    document.getElementById('resultSection').classList.remove('hidden');
    document.getElementById('quizArea').classList.remove('hidden');
  } catch (e) { alert("퀴즈 생성 실패: JSON 형식이 어긋났을 수 있습니다. 다시 시도해주세요."); location.reload(); }
}

function showQuestion() {
  answered = false;
  const q = quizData[currentQ];
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('quizProgress').textContent = `테스트 진행중: ${currentQ + 1} / ${quizData.length}`;
  document.getElementById('questionCard').innerHTML = `
    <h3 style="line-height:1.6; margin-bottom:20px;">${q.question}</h3>
    <div>${q.options.map((o, i) => `<div class="option" onclick="checkAnswer(${i})">(${i+1}) ${o}</div>`).join('')}</div>
    <div id="qExp" class="hidden" style="margin-top:15px; padding:15px; background:#1a2236; border-left:4px solid var(--accent)">💡 ${q.explanation}</div>
  `;
}

function checkAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = quizData[currentQ];
  const opts = document.querySelectorAll('.option');
  if (idx === q.answer) { opts[idx].classList.add('correct'); score++; }
  else { 
    opts[idx].classList.add('wrong'); opts[q.answer].classList.add('correct');
    wrongAnswers.push({ question: q.question, options: q.options, userAnswer: idx, correctAnswer: q.answer, explanation: q.explanation });
  }
  document.getElementById('qExp').classList.remove('hidden');
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() {
  if (currentQ < quizData.length - 1) { currentQ++; showQuestion(); }
  else {
    document.getElementById('quizArea').classList.add('hidden');
    document.getElementById('quizReviewArea').classList.remove('hidden');
    document.getElementById('finalScore').textContent = `결과: 총 ${quizData.length}문제 중 ${score}문제 정답`;
    let reviewHTML = "";
    if (wrongAnswers.length === 0) reviewHTML = `<div style="text-align:center; padding:30px; font-size:1.1rem">🎉 만점입니다! 정말 훌륭해요!</div>`;
    else {
      wrongAnswers.forEach((item, index) => {
        reviewHTML += `<div style="background:var(--card2); padding:20px; border-radius:12px; margin-bottom:20px; border:1px solid var(--border);">
          <h4 style="margin-bottom:15px;">오답 ${index + 1}. ${item.question}</h4>
          <div style="margin-bottom:15px;">${item.options.map((opt, i) => {
            let style = (i === item.correctAnswer) ? "color:var(--success); font-weight:bold;" : (i === item.userAnswer ? "color:var(--error); text-decoration:line-through;" : "color:var(--muted);");
            return `<div style="${style}">${i+1}. ${opt}</div>`;
          }).join('')}</div>
          <div style="padding:15px; background:#1a2236; border-left:4px solid var(--accent);"><strong>[해설]</strong><br>${item.explanation}</div>
        </div>`;
      });
    }
    document.getElementById('reviewList').innerHTML = reviewHTML;
  }
}

function switchTab(t) {
  document.getElementById('summaryTab').classList.toggle('hidden', t !== 'summary');
  document.getElementById('quizTab').classList.toggle('hidden', t !== 'quiz');
  document.getElementById('tabSummary').classList.toggle('active', t === 'summary');
  document.getElementById('tabQuiz').classList.toggle('active', t === 'quiz');
}
</script>
</body>
</html>
